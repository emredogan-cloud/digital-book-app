<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06070a">
<meta name="description" content="Yaşayan Kütüphane — atmosferik, el işçiliğiyle tasarlanmış kitapların çevrimdışı koleksiyonu.">
<!-- SUB-PR 1.3/1.4 hardening: strict CSP for the bookshelf shell. Books load their own fonts and have their own headers (frozen engine). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Living Library · Yaşayan Kütüphane</title>
<style>
  :root{
    --bg:#06070a;
    --surface:#0c0e13;
    --surface-2:#11141b;
    --line:rgba(255,255,255,.07);
    --line-strong:rgba(255,255,255,.14);
    --ink:#e9e6df;
    --ink-soft:#b6b3ac;
    --ink-mute:#7c7a75;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1100px 560px at 50% -12%,#0e121b 0%,var(--bg) 62%) no-repeat,var(--bg);
    color:var(--ink); font-family:var(--sans); line-height:1.55;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; min-height:100vh;
  }
  .wrap{max-width:940px; margin:0 auto; padding:clamp(2.5rem,6vw,5rem) clamp(1.1rem,4vw,2rem) 3.5rem;}

  /* masthead */
  .kicker{font-size:.72rem; letter-spacing:.42em; text-transform:uppercase; color:var(--ink-mute); margin:0 0 .85rem;}
  .wordmark{font-family:var(--serif); font-weight:500; font-size:clamp(2.1rem,6vw,3.1rem); letter-spacing:.005em; margin:0; color:var(--ink);}
  .lede{margin:.95rem 0 0; max-width:48ch; color:var(--ink-soft); font-size:1rem;}
  .rule{height:1px; background:var(--line); margin:clamp(1.7rem,4vw,2.4rem) 0 0;}

  /* hero — Continue reading */
  .hero{
    --accent:#8a8a8a;
    position:relative; display:grid; grid-template-columns:110px 1fr; gap:1.2rem;
    margin-top:clamp(1.6rem,4vw,2.2rem);
    padding:1.3rem 1.4rem;
    background:var(--surface); border:1px solid var(--line-strong); border-radius:18px; overflow:hidden;
  }
  .hero::before{content:""; position:absolute; inset:0 0 auto 0; height:3px;
    background:linear-gradient(90deg, var(--accent), transparent 70%);}
  .hero-cover{width:110px; height:165px; background-size:cover; background-position:center; border-radius:8px; box-shadow:0 8px 24px -12px #000;}
  .hero-body{display:flex; flex-direction:column; justify-content:center; min-width:0;}
  .hero-kicker{font-size:.7rem; letter-spacing:.36em; text-transform:uppercase; color:var(--accent); margin:0 0 .5rem;}
  .hero-title{font-family:var(--serif); font-weight:500; font-size:clamp(1.6rem,3.2vw,2rem); line-height:1.16; margin:0; color:var(--ink);}
  .hero-sub{font-size:.92rem; color:var(--ink-soft); margin:.3rem 0 1rem;}
  .hero-go{align-self:flex-start; display:inline-flex; align-items:center; gap:.5rem;
    background:transparent; color:var(--ink); border:1px solid var(--accent); border-radius:999px;
    padding:.55rem 1.1rem; font:inherit; font-size:.85rem; letter-spacing:.06em; cursor:pointer;
    transition:background .2s ease, color .2s ease;}
  .hero-go:hover, .hero-go:focus-visible{background:var(--accent); color:#000; outline:none;}
  @media (max-width:480px){
    .hero{grid-template-columns:80px 1fr; gap:.9rem; padding:1rem;}
    .hero-cover{width:80px; height:120px;}
  }

  /* section title */
  .section-title{font-size:.7rem; letter-spacing:.4em; text-transform:uppercase; color:var(--ink-mute); margin:clamp(1.8rem,4vw,2.6rem) 0 .85rem;}

  /* shelf grid + cover-card */
  .shelf{display:grid; gap:1rem; grid-template-columns:repeat(auto-fill,minmax(228px,1fr));}
  .book{
    --accent:#8a8a8a; position:relative; aspect-ratio:2 / 3;
    display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .book::before{content:""; position:absolute; inset:0 0 auto 0; height:2px; z-index:3;
    background:linear-gradient(90deg, var(--accent), transparent 75%);}
  .cover{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; background:var(--surface);}
  .overlay{position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, transparent 38%, rgba(6,7,10,.55) 70%, rgba(6,7,10,.92) 100%);}
  .book-meta{position:relative; z-index:2; margin-top:auto; padding:1.05rem 1.15rem;}
  .idx{font-family:var(--serif); font-size:.76rem; letter-spacing:.14em; color:rgba(233,230,223,.7);}
  .book h3{font-family:var(--serif); font-weight:500; font-size:1.22rem; line-height:1.16; margin:.35rem 0 .15rem; color:#fff;}
  .sub{font-size:.8rem; letter-spacing:.015em; color:var(--accent); margin:0 0 .55rem;}
  .go{font-size:.78rem; letter-spacing:.06em; color:rgba(233,230,223,.85); display:flex; align-items:center; gap:.4rem;}
  .go .arrow{color:var(--accent); transition:transform .25s ease;}
  .book:hover, .book:focus-visible{transform:translateY(-3px); border-color:var(--accent); box-shadow:0 14px 36px -20px #000; outline:none;}
  .book:hover .arrow, .book:focus-visible .arrow{transform:translateX(4px);}
  .book:focus-visible{box-shadow:0 0 0 2px var(--accent), 0 14px 36px -20px #000;}

  /* progress badge (SUB-PR 2.2) — small accent pill shown when the book has saved progress */
  .book-meta .progress-badge{display:inline-block; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); background:rgba(255,255,255,.08); padding:.18rem .55rem; border-radius:999px; margin-bottom:.4rem; align-self:flex-start;}
  /* streak badge in the kicker (SUB-PR 2.2) */
  .kicker .streak{font-size:.7rem; letter-spacing:.14em; text-transform:none; opacity:.85; color:var(--ink-soft);}

  /* footer */
  footer{margin-top:clamp(2.4rem,6vw,3.4rem); padding-top:1.4rem; border-top:1px solid var(--line); color:var(--ink-mute); font-size:.78rem; display:flex; justify-content:space-between; gap:1rem 1.5rem; flex-wrap:wrap;}
  footer code{font-family:var(--mono); color:var(--ink-soft);}
  /* SUB-PR 2.4: tiny in-footer consent toggle */
  .footer-actions{display:inline-flex; align-items:center; gap:.6rem;}
  .footer-consent{background:transparent; border:1px solid transparent; color:var(--ink-mute); font:inherit; font-size:.76rem; letter-spacing:.04em; cursor:pointer; padding:.22rem .65rem; border-radius:999px; transition:color .2s ease, background .2s ease, border-color .2s ease;}
  .footer-consent:hover,.footer-consent:focus-visible{color:var(--ink-soft); background:rgba(255,255,255,.04); border-color:var(--line); outline:none;}
  .footer-consent[data-state="granted"]{color:#86d4a3;}

  /* noscript fallback */
  .noscript-fallback{color:var(--ink-soft); font-size:.95rem; line-height:1.65;}
  .noscript-fallback h1{font-family:var(--serif); font-weight:500; font-size:2rem; margin:0 0 1rem;}
  .noscript-fallback ul{padding-left:1.2rem; margin:.6rem 0;}
  .noscript-fallback a{color:var(--ink);}

  /* entrance (progressive enhancement; cards become visible via JS) */
  @media (prefers-reduced-motion:no-preference){
    .book{opacity:0; transform:translateY(10px);}
    .book.reveal{opacity:1; transform:none; transition:opacity .5s ease, transform .5s ease;}
  }

  main[aria-busy="true"]{min-height:60vh;}
</style>
</head>
<body>
  <main id="ll-root" class="wrap" aria-busy="true">
    <noscript>
      <div class="noscript-fallback">
        <h1>Yaşayan Kütüphane</h1>
        <p>Bu sayfa JavaScript ile birlikte tam görünür. Doğrudan bağlantılar:</p>
        <ul>
          <li><a href="books/sarmasik/index.html">Sarmaşık · Nazar</a></li>
          <li><a href="books/tuzun-hafizasi/index.html">Tuzun Hafızası · Bir Kıyı Romanı</a></li>
          <li><a href="books/mendiran-vakayinamesi/index.html">Mendîran Vakayinâmesi</a></li>
          <li><a href="books/mythologica/index.html">Codex Mythologica</a></li>
          <li><a href="books/solgun-kitabe/index.html">Solgun Kitabe</a></li>
          <li><a href="books/fabl/index.html">Fabl · Küçük Masallar</a></li>
        </ul>
      </div>
    </noscript>
  </main>
  <script src="shell/shell.js"></script>
</body>
</html>
