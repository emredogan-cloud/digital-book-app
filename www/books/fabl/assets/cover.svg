<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200" role="img" aria-label="Fabl — Küçük Masallar">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c141b"/>
      <stop offset="34%"  stop-color="#1b2a36"/>
      <stop offset="56%"  stop-color="#3b4f5e"/>
      <stop offset="66%"  stop-color="#9e8252"/>
      <stop offset="74%"  stop-color="#d8c08a"/>
      <stop offset="82%"  stop-color="#ece2cd"/>
      <stop offset="100%" stop-color="#f3efe3"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f4dca0" stop-opacity="0.98"/>
      <stop offset="45%"  stop-color="#e3bd74" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#caa05c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#caa05c" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e9d4a0"/>
      <stop offset="100%" stop-color="#caa05c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#caa86a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#caa86a" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- Şafak göğü -->
  <rect width="800" height="1200" fill="url(#sky)"/>

  <!-- Ufuktaki güneş -->
  <circle cx="400" cy="792" r="240" fill="url(#sun)"/>
  <circle cx="400" cy="792" r="56" fill="#f1d695" opacity="0.92"/>
  <line x1="120" y1="792" x2="680" y2="792" stroke="url(#hz)" stroke-width="2"/>

  <!-- Şafakta kuşlar -->
  <path d="M 250 250 q 22 -22 40 0 q 18 -22 40 0" fill="none" stroke="#aebfc9" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <path d="M 470 212 q 14 -14 26 0 q 12 -14 26 0" fill="none" stroke="#aebfc9" stroke-width="2.4" opacity="0.5" stroke-linecap="round"/>

  <!-- İnce çerçeve -->
  <rect x="40" y="40" width="720" height="1120" fill="none" stroke="url(#frame)" stroke-width="1.5"/>

  <!-- Dizi -->
  <text x="400" y="152" text-anchor="middle" font-family="Marcellus, Georgia, serif" font-size="22" letter-spacing="8" fill="#cdb37c" opacity="0.88">İLK DEFTER · BİRİNCİ DERLEME</text>

  <!-- Başlık -->
  <text x="400" y="472" text-anchor="middle" font-family="Marcellus, 'Cormorant Garamond', Georgia, serif" font-size="150" letter-spacing="6" fill="#f1ead9">Fabl</text>

  <!-- Alt başlık -->
  <text x="400" y="540" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" font-size="40" fill="#e0cda2">küçük masallar</text>
  <line x1="330" y1="585" x2="470" y2="585" stroke="#cdb37c" stroke-width="1" opacity="0.6"/>

  <!-- Epigraf -->
  <text x="400" y="1006" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="29" fill="#3a3326">“Her küçük hikâye de bir şey bilir;</text>
  <text x="400" y="1046" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="29" fill="#3a3326">yeter ki acele edilmesin.”</text>

  <!-- Tab' -->
  <text x="400" y="1126" text-anchor="middle" font-family="Marcellus, Georgia, serif" font-size="20" letter-spacing="7" fill="#8a8068">İLK TAB' · MMXXVI</text>
</svg>
